name: Build BurhanApp

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BurhanApp-windows
            zip_name: BurhanApp-windows.zip
          - os: macos-latest
            artifact: BurhanApp-macos
            zip_name: BurhanApp-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create macOS icon (.icns)
        if: runner.os == 'macOS'
        run: |
          mkdir -p BurhanApp.iconset
          sips -z 16 16     assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_16x16.png
          sips -z 32 32     assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_32x32.png
          sips -z 64 64     assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_128x128.png
          sips -z 256 256   assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_128x128@2x.png
          sips -z 256 256   assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_256x256.png
          sips -z 512 512   assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_256x256@2x.png
          sips -z 512 512   assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_512x512.png
          sips -z 1024 1024 assets/BurhanApp_Icon.png --out BurhanApp.iconset/icon_512x512@2x.png
          iconutil -c icns BurhanApp.iconset -o assets/BurhanApp.icns

      - name: Build with PyInstaller
        run: pyinstaller BurhanApp.spec --noconfirm

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/BurhanApp/*" -DestinationPath "${{ matrix.zip_name }}"

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r -y "../${{ matrix.zip_name }}" BurhanApp.app/

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
