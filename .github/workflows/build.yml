name: Build BurhanApp

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BurhanApp-windows
            zip_name: BurhanApp-windows.zip
          - os: macos-latest
            artifact: BurhanApp-macos
            zip_name: BurhanApp-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller BurhanApp.spec --noconfirm

      - name: Zip build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/BurhanApp/*" -DestinationPath "${{ matrix.zip_name }}"

      - name: Zip build (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r "../${{ matrix.zip_name }}" BurhanApp/

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.zip_name }}

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.zip_name }}
